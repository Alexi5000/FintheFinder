name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run contracts:check
      - run: npm run notebooks:check
      - run: npm run test:coverage
      - run: npm run evals -- artifacts/evals/offline-summary.json
      - run: npm run benchmark:check
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: evals
          path: artifacts/evals
          if-no-files-found: ignore

  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - run: npm run audit
      - run: npm run smoke
      - name: Run hosted health smoke
        shell: bash
        run: |
          npm run start -- --hostname 127.0.0.1 > /tmp/fin-the-finder-next.log 2>&1 &
          server_pid=$!
          trap "kill $server_pid" EXIT
          SMOKE_URL=http://127.0.0.1:3000 npm run smoke

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: docker build -t fin-the-finder .
